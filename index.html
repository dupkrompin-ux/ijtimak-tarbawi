<script>
  const APP_URL='https://script.google.com/macros/s/AKfycbwVACA6kz51nh5oqmdvtEEvy3Ct9Ms1a5q4-vCCXLl8nBeruFRcFEmSay_UTLpaehxb/exec';
  if('serviceWorker' in navigator) navigator.serviceWorker.register('/ijtimak-tarbawi/sw.js').catch(():{});
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
  const isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
  if(isStandalone){ window.location.href=APP_URL; }
  setTimeout(()=>{document.getElementById('statusText').textContent='Membuka sistem...';},800);
  setTimeout(()=>{window.location.href=APP_URL;},2000);
  setTimeout(()=>{document.getElementById('btnManual').style.display='inline-block';document.getElementById('statusText').textContent='Klik butang jika tidak redirect';},4000);
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt',(e)=>{e.preventDefault();deferredPrompt=e;if(!isStandalone)setTimeout(()=>document.getElementById('installBanner').classList.add('show'),2500);});
  document.getElementById('btnInstall').addEventListener('click',async()=>{if(deferredPrompt){deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;document.getElementById('installBanner').classList.remove('show');}});
  if(isIOS&&!isStandalone)setTimeout(()=>document.getElementById('iosGuide').classList.add('show'),3000);
</script>
